<div class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg, #0a0f1e 0%, #111827 50%, #1a1f2e 100%);">
  <div class="w-full max-w-[440px] bg-white/[0.04] backdrop-blur-2xl rounded-3xl p-10 border border-white/[0.06] shadow-[0_32px_64px_-16px_rgba(0,0,0,0.5)]">
    <!-- Logo -->
    <div class="flex items-center gap-3 mb-8">
      <div class="w-11 h-11 rounded-xl bg-gradient-to-br from-primary to-blue-500 flex items-center justify-center">
        <span class="material-symbols-outlined text-white text-2xl" style="font-variation-settings:'FILL'1;">school</span>
      </div>
      <div>
        <h1 class="text-lg font-bold text-white">SchoolLink AI</h1>
        <p class="text-[11px] text-white/35">نظام إدارة المؤسسات التعليمية</p>
      </div>
    </div>

    <!-- Role Tabs -->
    <div class="flex bg-white/[0.04] rounded-2xl p-1 mb-8 border border-white/[0.06]">
      <button (click)="roleTab.set('admin')"
              class="flex-1 py-3 rounded-xl text-sm font-bold transition-all"
              [class]="roleTab() === 'admin' ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-white/40 hover:text-white/70'">
        <span class="material-symbols-outlined text-lg align-middle ml-1" style="font-variation-settings:'FILL'1;">admin_panel_settings</span>
        مدير النظام
      </button>
      <button (click)="roleTab.set('teacher')"
              class="flex-1 py-3 rounded-xl text-sm font-bold transition-all"
              [class]="roleTab() === 'teacher' ? 'bg-primary text-white shadow-lg shadow-primary/20' : 'text-white/40 hover:text-white/70'">
        <span class="material-symbols-outlined text-lg align-middle ml-1" style="font-variation-settings:'FILL'1;">school</span>
        معلم
      </button>
    </div>

    <h2 class="text-2xl font-bold text-white mb-1">تسجيل الدخول</h2>
    <p class="text-sm text-white/40 mb-7">أدخل بيانات اعتماد {{ roleTab() === 'admin' ? 'المدير' : 'المعلم' }}</p>

    <form #f="ngForm" (ngSubmit)="handleLogin(f)" class="space-y-4">
      <div class="relative">
        <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-white/20 text-lg">badge</span>
        <input ngModel name="email" type="email" required placeholder="البريد الإلكتروني"
               class="w-full py-[14px] pr-12 pl-4 bg-white/[0.04] border border-white/[0.08] rounded-xl text-sm text-white outline-none transition-all focus:border-primary/50 focus:bg-white/[0.06] placeholder:text-white/20" />
      </div>
      <div class="relative">
        <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-white/20 text-lg">key</span>
        <input ngModel name="password" #pwd type="password" required placeholder="كلمة المرور"
               class="w-full py-[14px] pr-12 pl-12 bg-white/[0.04] border border-white/[0.08] rounded-xl text-sm text-white outline-none transition-all focus:border-primary/50 focus:bg-white/[0.06] placeholder:text-white/20" />
        <button type="button" (click)="pwd.type = pwd.type === 'password' ? 'text' : 'password'"
                class="absolute left-3 top-1/2 -translate-y-1/2 bg-none border-none text-white/20 hover:text-white/50 p-0 cursor-pointer">
          <span class="material-symbols-outlined text-lg">visibility</span>
        </button>
      </div>

      <div class="flex items-center justify-between mt-1">
        <label class="flex items-center gap-2 text-xs text-white/45 cursor-pointer">
          <input type="checkbox" class="w-3.5 h-3.5 accent-primary" /> تذكرني
        </label>
        <a href="#" class="text-xs text-primary/70 hover:text-primary font-semibold no-underline">نسيت كلمة المرور؟</a>
      </div>

      <button type="submit"
              class="w-full py-3.5 border-none rounded-xl bg-gradient-to-l from-primary to-blue-600 text-white text-sm font-bold cursor-pointer flex items-center justify-center gap-2 transition-all hover:shadow-lg hover:shadow-primary/20 active:scale-[0.98]">
        <span class="material-symbols-outlined text-lg">login</span>
        دخول {{ roleTab() === 'admin' ? 'المدير' : 'المعلم' }}
      </button>
    </form>

    <p class="text-center mt-6 text-xs text-white/20">دخول الكادر التعليمي والإداري</p>
  </div>
</div>
