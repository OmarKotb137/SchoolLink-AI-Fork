<body style="font-family:'IBM Plex Sans Arabic',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a0533,#0d1b3e);padding:20px;position:relative">
  <div style="width:100%;max-width:380px;background:rgba(255,255,255,.04);backdrop-filter:blur(32px);border:1px solid rgba(255,255,255,.06);border-radius:32px;padding:40px 36px;position:relative;z-index:1">
    <div style="width:64px;height:64px;border-radius:50%;padding:3px;margin:0 auto 16px;background:conic-gradient(from 0deg,#9333ea,#3b82f6,#ec4899,#9333ea)">
      <div style="width:100%;height:100%;border-radius:50%;background:#1a0533;display:flex;align-items:center;justify-content:center">
        <span class="material-symbols-outlined" style="color:#a78bfa;font-size:28px;font-variation-settings:'FILL'1">person</span>
      </div>
    </div>
    <h2 style="text-align:center;font-size:22px;font-weight:700;color:#fff;margin-bottom:4px">تسجيل الدخول</h2>
    <p style="text-align:center;font-size:13px;color:rgba(255,255,255,.4);margin-bottom:28px">منصة <span style="background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">التعلم الذكية</span></p>
    <form #f="ngForm" (ngSubmit)="handleLogin(f)">
      <div style="position:relative;margin-bottom:12px">
        <span class="material-symbols-outlined" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:18px">badge</span>
        <input ngModel name="email" type="text" placeholder="اسم المستخدم أو البريد" style="width:100%;padding:14px 44px 14px 14px;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;font-size:13px;outline:none;background:rgba(255,255,255,.04);color:#fff;font-family:inherit">
      </div>
      <div style="position:relative;margin-bottom:12px">
        <span class="material-symbols-outlined" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:18px">lock</span>
        <input ngModel name="password" #pwd type="password" placeholder="كلمة المرور" style="width:100%;padding:14px 44px 14px 14px;border:1.5px solid rgba(255,255,255,.08);border-radius:14px;font-size:13px;outline:none;background:rgba(255,255,255,.04);color:#fff;font-family:inherit">
        <button type="button" (click)="togglePwd(pwd)" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.25);cursor:pointer;padding:0">
          <span class="material-symbols-outlined" style="font-size:18px">visibility</span>
        </button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin:16px 0 20px">
        <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,.45);cursor:pointer"><input type="checkbox" style="width:14px;height:14px;accent-color:#9333ea"> تذكرني</label>
        <a href="#" style="font-size:12px;color:#a78bfa;text-decoration:none;font-weight:600">مساعدة؟</a>
      </div>
      <button type="submit" style="width:100%;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,#9333ea,#3b82f6,#ec4899);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;background-size:200% 100%">
        <span class="material-symbols-outlined" style="font-size:18px">login</span> تسجيل الدخول
      </button>
    </form>
  </div>
</body>
