<body style="font-family:'IBM Plex Sans Arabic',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0f1e;padding:20px;position:relative">
  <div class="auth-card">
    <div class="logo" style="display:flex;align-items:center;gap:12px;margin-bottom:40px">
      <div style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#00236f,#1a4a9e);display:flex;align-items:center;justify-content:center">
        <span class="material-symbols-outlined" style="color:#fff;font-size:24px;font-variation-settings:'FILL'1">shield</span>
      </div>
      <div><h1 style="font-size:20px;font-weight:800;color:#fff">SchoolLink AI</h1><p style="font-size:11px;color:rgba(255,255,255,.35)">نظام إدارة المؤسسات</p></div>
    </div>
    <div style="display:inline-flex;align-items:center;gap:6px;background:rgba(0,35,111,.2);border:1px solid rgba(0,35,111,.3);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;color:#6fa3ff;margin-bottom:32px">
      <span class="material-symbols-outlined" style="font-size:16px">admin_panel_settings</span> مدير النظام
    </div>
    <h2 style="font-size:26px;font-weight:700;color:#fff;margin-bottom:6px">تسجيل الدخول</h2>
    <p style="font-size:14px;color:rgba(255,255,255,.4);margin-bottom:32px">أدخل بيانات اعتماد المدير</p>
    <form #f="ngForm" (ngSubmit)="handleLogin(f)">
      <div style="position:relative;margin-bottom:16px">
        <span class="material-symbols-outlined" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:18px">badge</span>
        <input ngModel name="username" type="text" placeholder="اسم المستخدم" style="width:100%;padding:14px 44px 14px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;font-size:14px;color:#fff;outline:none;font-family:inherit;transition:all .25s">
      </div>
      <div style="position:relative;margin-bottom:16px">
        <span class="material-symbols-outlined" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.2);font-size:18px">key</span>
        <input ngModel name="password" #pwd type="password" placeholder="كلمة المرور" style="width:100%;padding:14px 44px 14px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;font-size:14px;color:#fff;outline:none;font-family:inherit">
        <button type="button" (click)="togglePwd(pwd)" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.2);cursor:pointer;padding:0">
          <span class="material-symbols-outlined" style="font-size:18px">visibility</span>
        </button>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin:20px 0 24px">
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer"><input type="checkbox" style="width:15px;height:15px;accent-color:#00236f"> تذكرني</label>
        <a href="#" style="font-size:13px;color:#6fa3ff;text-decoration:none;font-weight:600">نسيت كلمة المرور؟</a>
      </div>
      @if (errorMsg()) {
        <div style="display:flex;align-items:center;gap:8px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);color:#fca5a5;font-size:13px;border-radius:12px;padding:12px 16px;margin-bottom:16px">
          <span class="material-symbols-outlined" style="font-size:16px;flex-shrink:0">error</span>
          {{ errorMsg() }}
        </div>
      }
      <button type="submit" style="width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#00236f,#1a4a9e);color:#fff;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px">
        <span class="material-symbols-outlined" style="font-size:18px">login</span> تسجيل الدخول
      </button>
    </form>
  </div>
</body>
